server:
  shutdown: graceful

management:
  endpoint:
    shutdown:
      access: unrestricted
  endpoints:
    web:
      exposure:
        include:
          - health
          - shutdown

spring:
  application:
    name: chap01-boot3
  lifecycle:
    timeout-per-shutdown-phase: 1m

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} [%thread] %clr(%-5level) %clr(%logger{72}){cyan} - %msg%n"
  level:
    root: info
    web: debug
    "[org.springboot.practice]": debug
