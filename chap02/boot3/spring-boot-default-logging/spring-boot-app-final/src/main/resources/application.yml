spring:
  application:
    name: spring-boot-default-logging

logging:
  pattern:
    console: "%clr(%d{dd-MM-yyyy HH:mm:ss.SSS}){yellow} %clr(${PID:- }){green} %magenta([%thread]) %highlight([%-5level]) %clr(%-40.40logger{39}){cyan} %msg%n"
  file:
    path: sbip/logs
  logback:
    rollingpolicy:
      max-history: 7
      max-file-size: 10MB
  level:
    root: info
    web: debug
    "[org.springboot.practice]": debug
