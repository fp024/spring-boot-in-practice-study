<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Add Course</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/custom.css}" />
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"
    />
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-sm ps-2 pe-2">
      <a class="navbar-brand brand-text" href="#">
        <img src="/images/logo.png" width="30" height="30" alt="logo" />
        Course Tracker
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbar-list"
        aria-controls="navbar-list"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div
        class="collapse navbar-collapse justify-content-between"
        id="navbar-list"
      >
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#" th:href="@{/index}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="#" th:href="@{/addcourse}"
              >Add Course <span class="visually-hidden">(current)</span></a
            >
          </li>
        </ul>
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <form th:action="@{/logout}" method="post">
              <button class="btn btn-danger" type="submit">logout</button>
            </form>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container my-5">
      <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-6">
          <h2 class="text-center mb-2">Add a Course</h2>
        </div>
        <div class="col-md-3"></div>
      </div>
      <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-9">
          <form
            action="#"
            th:action="@{/addcourse}"
            th:object="${course}"
            method="post"
          >
            <div class="row g-3">
              <div class="mb-2 col-md-9">
                <label for="name" class="form-label">Name</label>
                <input
                  type="text"
                  th:field="*{name}"
                  class="form-control"
                  id="name"
                  placeholder="Course Name"
                />
                <span
                  th:if="${#fields.hasErrors('name')}"
                  th:errors="*{name}"
                  class="text-danger"
                ></span>
              </div>
              <div class="mb-2 col-md-9">
                <label for="category" class="form-label">Category</label>
                <input
                  th:field="*{category}"
                  class="form-control"
                  id="category"
                  placeholder="Course Category"
                />
                <span
                  th:if="${#fields.hasErrors('category')}"
                  th:errors="*{category}"
                  class="text-danger"
                ></span>
              </div>
              <div class="mb-2 col-md-9">
                <label for="rating" class="form-label">Course Rating</label>
                <select th:field="*{rating}" class="form-select" id="rating">
                  <option th:value="1">1 (Lowest)</option>
                  <option th:value="2">2</option>
                  <option th:value="3">3</option>
                  <option th:value="4">4</option>
                  <option th:value="5">5 (Highest)</option>
                </select>
              </div>
              <div class="mb-3 col-md-9">
                <label for="description" class="form-label">Description</label>
                <textarea
                  th:field="*{description}"
                  class="form-control"
                  id="description"
                  placeholder="Course Description"
                ></textarea>
                <span
                  th:if="${#fields.hasErrors('description')}"
                  th:errors="*{description}"
                  class="text-danger"
                ></span>
              </div>
            </div>
            <div class="row">
              <div class="col-md-6 mt-2">
                <input type="submit" class="btn btn-dark" value="Add Course" />
              </div>
            </div>
          </form>
        </div>
        <div class="col-md-3"></div>
      </div>
    </div>
  </body>
</html>
