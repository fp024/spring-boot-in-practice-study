<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/custom.css}" />
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"
    />
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-sm">
      <a class="navbar-brand brand-text" href="#">
        <img src="/images/logo.png" width="30" height="30" alt="logo" />
        Course Tracker
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-toggle="collapse"
        data-target="#navbar-list"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div
        class="collapse navbar-collapse justify-content-between"
        id="navbar-list"
      >
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#" th:href="@{/index}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" th:href="@{/addcourse}">Add Course</a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container my-5">
      <div class="row">
        <div class="col-md-1"></div>
        <div class="col-md-10">
          <h4 class="mb-1 text-center text-danger">
            You are not authorized to perform this action
          </h4>
        </div>
        <div class="col-md-1"></div>
      </div>
      <div class="row pt-3">
        <div class="col-md-5"></div>
        <div class="col-md-2">
          <a class="btn btn-dark" href="#" th:href="@{/index}">Go Back</a>
        </div>
        <div class="col-md-5"></div>
      </div>
    </div>
  </body>
</html>
