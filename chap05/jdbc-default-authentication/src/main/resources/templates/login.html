<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <title>Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.css}" />
    <link rel="stylesheet" type="text/css" th:href="@{/css/custom.css}" />
    <link
      rel="stylesheet"
      type="text/css"
      th:href="@{/webjars/bootstrap/css/bootstrap.min.css}"
    />
    <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark navbar-expand-sm ps-2 pe-2">
      <a class="navbar-brand brand-text" href="#">
        <img src="/images/logo.png" width="30" height="30" alt="logo" />
        Course Tracker
      </a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbar-list"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div
        class="collapse navbar-collapse justify-content-between"
        id="navbar-list"
      >
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="#" th:href="@{/index}">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#" th:href="@{/addcourse}">Add Course</a>
          </li>
        </ul>
      </div>
    </nav>
    <div class="container my-5">
      <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-6">
          <h2 class="mb-1 text-center">Login</h2>
        </div>
        <div class="col-md-3"></div>
      </div>
      <div class="row">
        <div class="col-md-3"></div>
        <div class="col-md-6">
          <div th:if="${loginError}" class="alert alert-danger">
            Wrong Username or Password
          </div>
          <div th:if="${verified}" class="alert alert-success">
            Account has been verified. Please sign-in
          </div>
          <form th:action="@{/login}" method="post">
            <div class="mb-3">
              <label for="username">Username</label>
              <input
                id="username"
                type="text"
                class="form-control"
                name="username"
                placeholder="Enter Username"
                required
                autofocus
              />
            </div>
            <div class="mb-3">
              <label for="user_password">Password</label>
              <input
                id="user_password"
                type="password"
                class="form-control"
                name="password"
                placeholder="Enter Password"
                required
                autofocus
              />
            </div>
            <button type="submit" class="btn btn-dark">Submit</button>
          </form>
        </div>
        <div class="col-md-3"></div>
      </div>
    </div>
  </body>
</html>
