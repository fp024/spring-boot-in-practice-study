spring:
  application:
    name: spring-boot-actuator-info-endpoint
  datasource:
    url: jdbc:h2:mem:sbipdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    open-in-view: false
    properties:
      "[hibernate.format_sql]": true
      "[hibernate.dialect]": org.hibernate.dialect.H2Dialect

logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} [%thread] %clr(%-5level) %clr(%logger{72}){cyan} - %msg%n"
  level:
    root: info
    web: debug
    "[org.springboot.practice]": debug
    "[org.hibernate.orm.jdbc.bind]": trace
    # "[org.hibernate.orm.jdbc.extract]": trace

management:
  endpoints:
    web:
      exposure:
        include:
          - "*"
  info:
    env:
      enabled: true
    java:
      enabled: true
  server:
    port: 8081

info:
  app:
    name: Spring Boot Actuator Info Application
    description: Spring Boot application that explores the /info endpoint
    version: 1.0.0
  # 💡 여기에 build 정보를 적는 것은 별의미가 없었다.
  #     build.gradle의 buildInfo() 설정이 우선이 되었다.
